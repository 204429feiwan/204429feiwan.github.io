<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - 青粿制造局</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background-color: #f4f4f4; color: #333; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 10px; }
        a { text-decoration: none; color: #333; }

        .top-bar { background-color: #fff; border-bottom: 1px solid #ddd; padding: 10px 0; font-size: 12px; }
        .top-nav { display: flex; justify-content: space-between; }
        .top-nav a { margin-left: 10px; color: #999; }

        .header { background-color: #fff; padding: 15px 0; }
        .header-main { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 28px; color: #4F7942; font-weight: bold; cursor: pointer; }
        .search-box { display: flex; width: 500px; max-width: 100%; }
        .search-input { flex: 1; padding: 10px; border: 2px solid #4F7942; border-radius: 20px 0 0 20px; outline: none; font-size: 14px; }
        .search-btn { background-color: #4F7942; color: #fff; border: none; padding: 0 20px; border-radius: 0 20px 20px 0; cursor: pointer; font-weight: bold; }

        .search-info { background: #fff; padding: 15px 20px; margin: 20px 0; border-radius: 8px; font-size: 14px; color: #666; }
        .search-info strong { color: #e67e22; }

        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .product-card { background: #fff; border-radius: 8px; overflow: hidden; cursor: pointer; transition: box-shadow 0.3s, transform 0.3s; }
        .product-card:hover { box-shadow: 0 5px 20px rgba(0,0,0,0.1); transform: translateY(-3px); }
        .product-img { width: 100%; height: 200px; object-fit: cover; background: #f8f8f8; }
        .product-info { padding: 15px; }
        .product-name { font-size: 14px; line-height: 1.4; margin-bottom: 8px; }
        .product-price { font-size: 20px; color: #e67e22; font-weight: bold; }

        .no-result { text-align: center; padding: 60px 0; color: #999; }
        .no-result-icon { font-size: 60px; margin-bottom: 15px; }
        .back-link { display: inline-block; margin-top: 20px; padding: 10px 30px; background: #4F7942; color: #fff; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="container top-nav">
            <div class="left"><a href="index.html">返回首页</a></div>
            <div class="right">
                <a href="cart.html">购物车</a>
                <a href="login.html">登录</a>
            </div>
        </div>
    </div>

    <header class="header">
        <div class="container header-main">
            <div class="logo" onclick="window.location.href='index.html'">青粿制造局</div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索青粿、艾草、礼盒...">
                <button class="search-btn" onclick="doSearch()">搜索</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="search-info" id="searchInfo"></div>
        <div class="result-grid" id="resultGrid"></div>
    </div>

    <script>
        const allProducts = [
            { name: "【春日限定】知味观雪菜笋肉青粿 300g/6只装", price: 29.9, img: "img/雪菜笋肉.png", keywords: "雪菜 笋肉 咸味 知味观" },
            { name: "笋肉三丁馅青粿 传统江南风味 300g/6只", price: 35.5, img: "img/笋肉三丁.png", keywords: "笋肉 三丁 咸味 江南" },
            { name: "青粿礼盒装 手工制作 送礼佳品", price: 88.0, img: "img/礼盒装.jpg", keywords: "礼盒 送礼 手工" },
            { name: "艾草精粉 自制青粿必备原料 100g", price: 22.8, img: "img/艾草粉.png", keywords: "艾草 原料 粉 自制" },
            { name: "豆沙馅甜味青粿 经典红豆沙 300g/6只", price: 26.9, img: "img/雪菜笋肉.png", keywords: "豆沙 甜味 红豆" },
            { name: "野菜香干馅青粿 清新时令 300g/6只", price: 32.0, img: "img/笋肉三丁.png", keywords: "野菜 香干 咸味" },
            { name: "芝麻花生馅甜味青粿 香浓可口 300g/6只", price: 28.5, img: "img/礼盒装.jpg", keywords: "芝麻 花生 甜味" },
            { name: "艾草青粿DIY套装 含艾草粉+糯米粉+教程", price: 45.0, img: "img/艾草粉.png", keywords: "DIY 套装 艾草 自制" }
        ];

        function getQuery() {
            const url = new URLSearchParams(window.location.search);
            return url.get('q') || '';
        }

        function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (q) window.location.href = 'search.html?q=' + encodeURIComponent(q);
        }

        const query = getQuery();
        document.getElementById('searchInput').value = query;

        const results = allProducts.filter(p =>
            p.name.includes(query) || p.keywords.includes(query)
        );

        document.getElementById('searchInfo').innerHTML = query
            ? `搜索 "<strong>${query}</strong>"，找到 <strong>${results.length}</strong> 件商品`
            : '请输入搜索关键词';

        const grid = document.getElementById('resultGrid');
        if (results.length === 0 && query) {
            grid.innerHTML = `
                <div class="no-result" style="grid-column:1/-1">
                    <div class="no-result-icon">🔍</div>
                    <p style="font-size:18px">没有找到相关商品</p>
                    <p style="color:#999;margin-top:8px">试试其他关键词，如"青粿"、"艾草"、"礼盒"</p>
                    <a href="category.html" class="back-link">浏览全部商品</a>
                </div>`;
        } else {
            grid.innerHTML = results.map(p => `
                <div class="product-card" onclick="window.location.href='product.html'">
                    <img src="${p.img}" alt="${p.name}" class="product-img" onerror="this.style.background='#e8f5e9'">
                    <div class="product-info">
                        <div class="product-name">${p.name.replace(query, '<strong style="color:#e67e22">'+query+'</strong>')}</div>
                        <div class="product-price">¥${p.price.toFixed(1)}</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
